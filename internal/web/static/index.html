<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GoAnime Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root {
      --bg: #08151a;
      --bg-soft: #0f242b;
      --card: #13333d;
      --ink: #f2f7f4;
      --muted: #b8cec7;
      --accent: #ffa63f;
      --accent-2: #4ad9ca;
      --danger: #ff6a5f;
      --ok: #4cd46b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, #174654 0, transparent 45%),
        radial-gradient(circle at 90% 20%, #4a3018 0, transparent 40%),
        radial-gradient(circle at 50% 95%, #0a6c62 0, transparent 35%),
        var(--bg);
      font-family: "IBM Plex Sans", sans-serif;
      min-height: 100vh;
    }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .brand {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 99px;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 18px rgba(255, 166, 63, 0.6);
      animation: pulse 2.1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.35); opacity: 0.6; }
    }

    .layout {
      display: grid;
      grid-template-columns: 430px 1fr;
      gap: 18px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(19, 51, 61, 0.95), rgba(15, 35, 42, 0.96));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(6px);
    }

    .controls {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    input, select, button {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 10px;
      font: inherit;
      color: var(--ink);
      background: rgba(8, 22, 29, 0.9);
      padding: 10px 12px;
    }

    button {
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
      background: linear-gradient(130deg, #ff9f38, #f26a3d);
      color: #131313;
      border: 0;
      font-weight: 600;
    }

    button:hover { transform: translateY(-1px); }
    button.secondary {
      background: linear-gradient(120deg, #64d9d2, #2baea2);
      color: #062323;
    }

    .result-list, .episode-list {
      display: grid;
      gap: 8px;
      max-height: 62vh;
      overflow: auto;
      padding-right: 4px;
    }

    .list-heading {
      font-family: "Space Grotesk", sans-serif;
      font-size: .88rem;
      font-weight: 700;
      letter-spacing: .02em;
      margin: 10px 2px 8px;
      color: #d6ece4;
    }

    .library-radio {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      min-height: 320px;
    }

    .library-panel {
      flex: 1 1 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 10px;
      background: rgba(3, 12, 16, 0.56);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      transition: flex-basis .22s ease, background .22s ease, border-color .22s ease;
    }

    .library-panel.expanded {
      flex: 1 1 auto;
      border-color: rgba(74, 217, 202, 0.4);
      background: rgba(4, 14, 19, 0.78);
    }

    .library-panel.collapsed {
      flex: 0 0 104px;
      overflow: hidden;
    }

    .library-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }

    .library-title-btn {
      appearance: none;
      border: 0;
      background: transparent;
      color: #d0e5dd;
      padding: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      letter-spacing: .01em;
      cursor: pointer;
    }

    .library-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: .95rem;
    }

    .library-count {
      font-size: .75rem;
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      padding: 2px 7px;
      background: rgba(8, 26, 31, 0.85);
    }

    .library-body {
      display: grid;
      min-height: 0;
    }

    .tree-list {
      display: grid;
      gap: 8px;
      max-height: 100%;
      overflow: auto;
      padding-right: 4px;
    }

    .tree-node {
      display: grid;
      gap: 8px;
    }

    .tree-meta {
      font-size: .8rem;
      color: var(--muted);
    }

    .tree-episodes {
      display: grid;
      gap: 6px;
      margin-left: 12px;
      border-left: 2px solid rgba(255, 255, 255, 0.12);
      padding-left: 8px;
    }

    .tree-episode-row {
      cursor: default;
    }

    .muted-inline {
      color: var(--muted);
      font-size: .78rem;
    }

    .item.watched {
      border-color: rgba(74, 217, 202, 0.85);
      box-shadow: inset 0 0 0 1px rgba(74, 217, 202, 0.4);
    }

    .item.selected-subitem {
      border-color: rgba(255, 166, 63, 0.88);
    }

    .library-panel.collapsed .library-body,
    .library-panel.collapsed .tiny-btn.warn {
      display: none;
    }

    .library-panel.collapsed .library-head {
      justify-content: center;
    }

    .library-panel.collapsed .library-title-btn {
      width: 100%;
      display: grid;
      justify-items: center;
      gap: 10px;
      text-align: center;
    }

    .library-panel.collapsed .library-title {
      font-size: .9rem;
      line-height: 1.1;
    }

    .entry-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .tiny-btn {
      border-radius: 8px;
      padding: 6px 8px;
      font-size: .75rem;
      line-height: 1.1;
      background: rgba(21, 54, 65, 0.9);
      color: #d8f4eb;
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-weight: 600;
    }

    .tiny-btn.warn {
      background: rgba(87, 31, 17, 0.88);
      color: #ffe5db;
      border-color: rgba(255, 131, 95, 0.52);
    }

    .item {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 9px;
      background: rgba(6, 17, 22, 0.8);
      color: var(--ink);
      cursor: pointer;
      transition: border-color .2s ease, transform .15s ease;
      display: grid;
      gap: 4px;
    }

    .item:hover { transform: translateY(-1px); border-color: rgba(255, 166, 63, 0.65); }
    .item.active { border-color: var(--accent-2); }

    .title {
      font-weight: 700;
      font-size: .98rem;
      color: #f4fbf8;
      line-height: 1.25;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
    }
    .meta { font-size: .82rem; color: var(--muted); }

    .viewer {
      display: grid;
      gap: 12px;
    }

    .video-wrap {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: #05090b;
      min-height: 320px;
    }

    video {
      width: 100%;
      min-height: 320px;
      background: #000;
      display: block;
    }

    .info {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: .9rem;
    }

    .chip {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      padding: 4px 10px;
      background: rgba(9, 22, 27, 0.84);
    }

    .status {
      font-size: .9rem;
      min-height: 22px;
      color: var(--muted);
      animation: reveal .24s ease;
    }

    .status.error { color: var(--danger); }
    .status.ok { color: var(--ok); }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(-3px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .player-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .grow { flex: 1; min-width: 120px; }

    .loading-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      background: rgba(4, 12, 15, 0.62);
      backdrop-filter: blur(2px);
    }

    .loading-overlay.active {
      display: flex;
      animation: reveal .18s ease;
    }

    .loading-box {
      min-width: 280px;
      max-width: 86vw;
      text-align: center;
      padding: 16px 18px;
      border-radius: 14px;
      border: 1px solid rgba(74, 217, 202, 0.45);
      background: linear-gradient(180deg, rgba(8, 31, 37, 0.96), rgba(7, 21, 26, 0.96));
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
      color: #ebfff7;
      font-weight: 700;
      letter-spacing: 0.01em;
      font-size: 1rem;
    }

    #searchBtn:disabled {
      opacity: 0.58;
      cursor: not-allowed;
      transform: none;
      filter: saturate(0.55);
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .result-list { max-height: 38vh; }
      .episode-list { max-height: 30vh; }
      .video-wrap, video { min-height: 240px; }
      .library-radio {
        flex-direction: column;
        min-height: unset;
      }
      .library-panel.collapsed {
        flex: 1 1 auto;
      }
      .library-panel.collapsed .library-head {
        justify-content: space-between;
      }
      .library-panel.collapsed .library-title-btn {
        display: inline-flex;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand"><span class="dot"></span> GoAnime Web</div>
      <div class="meta">Search, watch, and download from current sources</div>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="controls">
          <input id="searchInput" type="text" placeholder="Search anime, movie, TV..." />
          <select id="sourceSelect" title="Optional filter (default: all sources)">
            <option value="all">All sources (recommended)</option>
            <option value="anime">Anime only</option>
            <option value="movie">Movies only</option>
            <option value="tv">TV shows only</option>
            <option value="allanime">Only AllAnime</option>
            <option value="animefire">Only AnimeFire</option>
            <option value="flixhq">Only FlixHQ</option>
            <option value="embedmovies">Only EmbedMovies</option>
          </select>
          <button id="searchBtn">Search</button>
        </div>

        <div class="list-heading">Results</div>
        <div id="resultList" class="result-list"></div>

        <div id="libraryRadio" class="library-radio">
          <div id="historyPanel" class="library-panel expanded">
            <div class="library-head">
              <button id="historyToggleBtn" class="library-title-btn" type="button">
                <span class="library-title">Histórico</span>
                <span id="historyCount" class="library-count">0</span>
              </button>
              <button id="clearHistoryBtn" class="tiny-btn warn" type="button">Limpar</button>
            </div>
            <div class="library-body">
              <div id="historyTree" class="tree-list"></div>
            </div>
          </div>

          <div id="planPanel" class="library-panel collapsed">
            <div class="library-head">
              <button id="planToggleBtn" class="library-title-btn" type="button">
                <span class="library-title">Minha lista</span>
                <span id="planCount" class="library-count">0</span>
              </button>
              <button id="clearPlanBtn" class="tiny-btn warn" type="button">Limpar</button>
            </div>
            <div class="library-body">
              <div id="planTree" class="tree-list"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel viewer">
        <div class="player-actions">
          <select id="seasonSelect" class="grow"></select>
          <select id="episodeSelect" class="grow"></select>
          <select id="qualitySelect" class="grow">
            <option value="best">Best</option>
            <option value="1080">1080p</option>
            <option value="720">720p</option>
            <option value="480">480p</option>
            <option value="worst">Worst</option>
          </select>
          <button id="playBtn" class="secondary">Play</button>
          <button id="downloadBtn">Download</button>
          <button id="planBtn" type="button">Minha lista</button>
        </div>

        <div class="video-wrap">
          <video id="player" controls playsinline></video>
          <iframe id="embedFrame" style="display:none; width:100%; min-height:320px; border:0;" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen></iframe>
        </div>

        <div class="info">
          <span id="currentName" class="chip">No media selected</span>
          <span id="currentMeta" class="chip">Select an item to load episodes</span>
        </div>

        <div id="episodeList" class="episode-list"></div>
        <div id="status" class="status"></div>
      </section>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay" aria-live="polite" aria-busy="false">
    <div id="loadingMessage" class="loading-box">Searching sources...</div>
  </div>

  <script>
    const HISTORY_KEY = 'goanime_web_history_v1';
    const PLAN_KEY = 'goanime_web_plan_v1';

    const state = {
      selectedMediaId: null,
      selectedMedia: null,
      episodes: [],
      selectedEpisode: 1,
      selectedSeason: 1,
      hls: null,
      historyRecords: [],
      planItems: [],
      selectedHistoryAnimeKey: '',
      selectedPlanAnimeKey: '',
      activeCollectionPanel: 'history',
    };

    const refs = {
      input: document.getElementById('searchInput'),
      source: document.getElementById('sourceSelect'),
      search: document.getElementById('searchBtn'),
      resultList: document.getElementById('resultList'),
      seasonSelect: document.getElementById('seasonSelect'),
      episodeSelect: document.getElementById('episodeSelect'),
      quality: document.getElementById('qualitySelect'),
      play: document.getElementById('playBtn'),
      download: document.getElementById('downloadBtn'),
      episodeList: document.getElementById('episodeList'),
      player: document.getElementById('player'),
      embedFrame: document.getElementById('embedFrame'),
      status: document.getElementById('status'),
      currentName: document.getElementById('currentName'),
      currentMeta: document.getElementById('currentMeta'),
      loadingOverlay: document.getElementById('loadingOverlay'),
      loadingMessage: document.getElementById('loadingMessage'),
      planBtn: document.getElementById('planBtn'),
      historyPanel: document.getElementById('historyPanel'),
      planPanel: document.getElementById('planPanel'),
      historyToggleBtn: document.getElementById('historyToggleBtn'),
      planToggleBtn: document.getElementById('planToggleBtn'),
      historyCount: document.getElementById('historyCount'),
      planCount: document.getElementById('planCount'),
      clearHistoryBtn: document.getElementById('clearHistoryBtn'),
      clearPlanBtn: document.getElementById('clearPlanBtn'),
      historyTree: document.getElementById('historyTree'),
      planTree: document.getElementById('planTree'),
    };

    function loadCollection(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return fallback;
        return parsed;
      } catch {
        return fallback;
      }
    }

    function saveCollection(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function animeKey(item) {
      const source = String(item?.source || '').trim().toLowerCase();
      const mediaURL = String(item?.media_url || '').trim();
      return `${source}::${mediaURL}`;
    }

    function animeDisplayName(item) {
      return (item?.anime_name || item?.name || 'Untitled media').trim();
    }

    function safeText(v) {
      return String(v || '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[ch]));
    }

    function shortTime(isoValue) {
      const t = new Date(isoValue);
      if (Number.isNaN(t.getTime())) return 'Unknown time';
      return `${t.toLocaleDateString()} ${t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
    }

    function groupHistory() {
      const grouped = new Map();
      for (const rec of state.historyRecords) {
        if (!rec?.anime_key) continue;
        if (!grouped.has(rec.anime_key)) {
          grouped.set(rec.anime_key, {
            animeKey: rec.anime_key,
            anime: rec.anime,
            episodes: [],
            latestAt: rec.at,
          });
        }
        const group = grouped.get(rec.anime_key);
        group.episodes.push(rec);
        if (new Date(rec.at).getTime() > new Date(group.latestAt).getTime()) {
          group.latestAt = rec.at;
        }
      }

      return Array.from(grouped.values()).sort((a, b) => new Date(b.latestAt) - new Date(a.latestAt));
    }

    function groupedHistoryEpisodes(animeKeyValue) {
      const episodes = new Map();
      for (const rec of state.historyRecords) {
        if (rec.anime_key !== animeKeyValue) continue;
        const epKey = `${Number(rec.season) || 1}::${Number(rec.episode) || 1}`;
        const prev = episodes.get(epKey);
        if (!prev || new Date(rec.at) > new Date(prev.at)) {
          episodes.set(epKey, rec);
        }
      }

      return Array.from(episodes.values()).sort((a, b) => {
        const byDate = new Date(b.at).getTime() - new Date(a.at).getTime();
        if (byDate !== 0) return byDate;

        const bySeason = (Number(b.season) || 1) - (Number(a.season) || 1);
        if (bySeason !== 0) return bySeason;

        return (Number(b.episode) || 1) - (Number(a.episode) || 1);
      });
    }

    function watchedEpisodeSetForSelectedAnime() {
      if (!state.selectedMedia) return new Set();
      const key = animeKey(state.selectedMedia);
      const watched = new Set();
      for (const rec of state.historyRecords) {
        if (rec.anime_key !== key) continue;
        watched.add(Number(rec.episode));
      }
      return watched;
    }

    function setActiveCollectionPanel(panelName) {
      state.activeCollectionPanel = panelName === 'plan' ? 'plan' : 'history';
      const historyExpanded = state.activeCollectionPanel === 'history';

      refs.historyPanel.classList.toggle('expanded', historyExpanded);
      refs.historyPanel.classList.toggle('collapsed', !historyExpanded);
      refs.planPanel.classList.toggle('expanded', !historyExpanded);
      refs.planPanel.classList.toggle('collapsed', historyExpanded);
    }

    function renderHistoryPanels() {
      const grouped = groupHistory();
      refs.historyCount.textContent = String(grouped.length);
      refs.historyTree.innerHTML = '';

      if (grouped.length === 0) {
        refs.historyTree.innerHTML = '<div class="muted-inline">Sem histórico ainda.</div>';
        return;
      }

      if (state.selectedHistoryAnimeKey && !grouped.some((g) => g.animeKey === state.selectedHistoryAnimeKey)) {
        state.selectedHistoryAnimeKey = '';
      }

      for (const entry of grouped) {
        const node = document.createElement('article');
        node.className = 'tree-node';

        const isExpanded = state.selectedHistoryAnimeKey === entry.animeKey;

        const card = document.createElement('div');
        card.className = `item ${isExpanded ? 'selected-subitem' : ''}`.trim();
        card.innerHTML = `
          <div class="title">${safeText(animeDisplayName(entry.anime))}</div>
          <div class="tree-meta">Ultima atividade: ${safeText(shortTime(entry.latestAt))}</div>
        `;
        card.onclick = () => {
          state.selectedHistoryAnimeKey = isExpanded ? '' : entry.animeKey;
          renderHistoryPanels();
        };

        const actions = document.createElement('div');
        actions.className = 'entry-actions';

        const openBtn = document.createElement('button');
        openBtn.className = 'tiny-btn';
        openBtn.type = 'button';
        openBtn.textContent = 'Abrir lista';
        openBtn.onclick = async (event) => {
          event.stopPropagation();
          setActiveCollectionPanel('history');
          await openMediaFromStoredAnime(entry.anime);
        };

        actions.appendChild(openBtn);
        card.appendChild(actions);
        node.appendChild(card);

        if (isExpanded) {
          const episodes = groupedHistoryEpisodes(entry.animeKey);
          const episodeList = document.createElement('div');
          episodeList.className = 'tree-episodes';

          if (episodes.length === 0) {
            episodeList.innerHTML = '<div class="muted-inline">Sem episodios registrados para este anime.</div>';
          } else {
            for (const ep of episodes) {
              const row = document.createElement('div');
              row.className = 'item tree-episode-row';
              row.innerHTML = `
                <div class="title">Temporada ${Number(ep.season) || 1} - Episodio ${Number(ep.episode) || 1}</div>
                <div class="tree-meta">Ultima acao: ${safeText(ep.action || 'play')}</div>
                <div class="tree-meta">${safeText(shortTime(ep.at))}</div>
              `;

              const epActions = document.createElement('div');
              epActions.className = 'entry-actions';

              const openEpisodeBtn = document.createElement('button');
              openEpisodeBtn.className = 'tiny-btn';
              openEpisodeBtn.type = 'button';
              openEpisodeBtn.textContent = 'Abrir episodio';
              openEpisodeBtn.onclick = async () => {
                setActiveCollectionPanel('history');
                await openMediaFromStoredAnime(ep.anime, Number(ep.episode) || 1, Number(ep.season) || 1);
              };

              epActions.appendChild(openEpisodeBtn);
              row.appendChild(epActions);
              episodeList.appendChild(row);
            }
          }

          node.appendChild(episodeList);
        }

        refs.historyTree.appendChild(node);
      }
    }

    function renderPlanPanels() {
      refs.planCount.textContent = String(state.planItems.length);
      refs.planTree.innerHTML = '';

      if (state.planItems.length === 0) {
        refs.planTree.innerHTML = '<div class="muted-inline">Nenhum anime na sua lista.</div>';
        return;
      }

      const sortedPlans = [...state.planItems].sort((a, b) => new Date(b.added_at) - new Date(a.added_at));

      for (const plan of sortedPlans) {
        const node = document.createElement('article');
        node.className = 'tree-node';

        const card = document.createElement('div');
        card.className = 'item';
        card.innerHTML = `
          <div class="title">${safeText(animeDisplayName(plan.anime))}</div>
        `;

        const actions = document.createElement('div');
        actions.className = 'entry-actions';

        const openBtn = document.createElement('button');
        openBtn.className = 'tiny-btn';
        openBtn.type = 'button';
        openBtn.textContent = 'Abrir lista';
        openBtn.onclick = async () => {
          setActiveCollectionPanel('plan');
          await openMediaFromStoredAnime(plan.anime);
        };

        const removeBtn = document.createElement('button');
        removeBtn.className = 'tiny-btn warn';
        removeBtn.type = 'button';
        removeBtn.textContent = 'Remover';
        removeBtn.onclick = () => {
          state.planItems = state.planItems.filter((x) => x.anime_key !== plan.anime_key);
          saveCollection(PLAN_KEY, state.planItems);
          renderPlanPanels();
        };

        actions.appendChild(openBtn);
        actions.appendChild(removeBtn);
        card.appendChild(actions);
        node.appendChild(card);

        refs.planTree.appendChild(node);
      }
    }

    function normalizeAnimeForStorage(item) {
      return {
        anime_name: animeDisplayName(item),
        name: String(item?.name || ''),
        source: String(item?.source || ''),
        image_url: String(item?.image_url || ''),
        media_type: String(item?.media_type || 'anime'),
        year: String(item?.year || ''),
        language: String(item?.language || ''),
        media_url: String(item?.media_url || ''),
        imdb_id: String(item?.imdb_id || ''),
      };
    }

    function recordHistory(action) {
      if (!state.selectedMedia) return;

      const anime = normalizeAnimeForStorage(state.selectedMedia);
      const key = animeKey(anime);
      const entry = {
        anime_key: key,
        anime,
        episode: Number(state.selectedEpisode || 1),
        season: Number(refs.seasonSelect.value || state.selectedSeason || 1),
        action,
        at: new Date().toISOString(),
        list_url: anime.media_url,
      };

      state.historyRecords.push(entry);
      if (state.historyRecords.length > 1000) {
        state.historyRecords = state.historyRecords.slice(state.historyRecords.length - 1000);
      }

      saveCollection(HISTORY_KEY, state.historyRecords);
      renderHistoryPanels();
      refreshEpisodeWatchedStyle();
    }

    function addPlanCurrentAnime() {
      if (!state.selectedMediaId || !state.selectedMedia) {
        setStatus('Select a media item first.', 'error');
        return;
      }

      const anime = normalizeAnimeForStorage(state.selectedMedia);
      const key = animeKey(anime);
      const currentSeason = Number(refs.seasonSelect.value || 1);
      const episodeSnapshot = state.episodes
        .map((x) => ({
          season: currentSeason,
          episode: Number(x.number),
        }))
        .filter((x) => x.episode > 0);

      const existing = state.planItems.find((x) => x.anime_key === key);
      if (existing) {
        existing.anime = anime;
        existing.episodes = episodeSnapshot;
        existing.updated_at = new Date().toISOString();
      } else {
        state.planItems.push({
          anime_key: key,
          anime,
          episodes: episodeSnapshot,
          added_at: new Date().toISOString(),
          updated_at: new Date().toISOString(),
        });
      }

      saveCollection(PLAN_KEY, state.planItems);
      state.selectedPlanAnimeKey = key;
      setActiveCollectionPanel('plan');
      renderPlanPanels();
      setStatus(`${animeDisplayName(anime)} adicionado a Minha lista.`, 'ok');
    }

    async function openMediaFromStoredAnime(anime, episodeNum = null, seasonNum = 1) {
      const params = new URLSearchParams({
        media_url: String(anime?.media_url || ''),
        source: String(anime?.source || ''),
        name: String(anime?.name || anime?.anime_name || ''),
        image_url: String(anime?.image_url || ''),
        media_type: String(anime?.media_type || 'anime'),
        year: String(anime?.year || ''),
        imdb_id: String(anime?.imdb_id || ''),
      });

      if (!params.get('media_url')) {
        setStatus('Cannot open this item: media_url is missing.', 'error');
        return;
      }

      try {
        const res = await fetch(`/api/media/resolve?${params.toString()}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'failed to resolve media');
        if (!data.item?.id) throw new Error('invalid resolve response');

        await selectMedia(data.item, null);

        if (episodeNum !== null && !Number.isNaN(Number(episodeNum))) {
          const wanted = Number(episodeNum);
          const seasonWanted = Number(seasonNum || 1);
          if (!refs.seasonSelect.disabled && refs.seasonSelect.value !== String(seasonWanted)) {
            refs.seasonSelect.value = String(seasonWanted);
            await loadEpisodes();
          }

          const match = state.episodes.find((ep) => Number(ep.number) === wanted);
          if (match) {
            state.selectedEpisode = wanted;
            refs.episodeSelect.value = String(wanted);
            highlightEpisode(wanted);
          }
        }

        setStatus(`Loaded ${animeDisplayName(anime)} from saved list.`, 'ok');
      } catch (err) {
        setStatus(`Open saved anime error: ${err.message}`, 'error');
      }
    }

    function setStatus(text, type = '') {
      refs.status.className = `status ${type}`.trim();
      refs.status.textContent = text || '';
    }

    function setSearchLoading(active, message = 'Searching sources...') {
      refs.search.disabled = !!active;
      refs.search.textContent = active ? 'Searching...' : 'Search';

      refs.loadingMessage.textContent = message;
      refs.loadingOverlay.classList.toggle('active', !!active);
      refs.loadingOverlay.setAttribute('aria-busy', active ? 'true' : 'false');
    }

    function resetPlayerAndSelection() {
      if (state.hls) {
        state.hls.destroy();
        state.hls = null;
      }

      refs.player.pause();
      refs.player.removeAttribute('src');
      refs.player.load();
      refs.player.style.display = 'block';

      refs.embedFrame.style.display = 'none';
      refs.embedFrame.removeAttribute('src');

      state.selectedMediaId = null;
      state.selectedMedia = null;
      state.episodes = [];
      state.selectedEpisode = 1;
      state.selectedSeason = 1;

      refs.currentName.textContent = 'No media selected';
      refs.currentMeta.textContent = 'Select an item to load episodes';
      refs.episodeList.innerHTML = '';
      refs.episodeSelect.innerHTML = '';
      refs.seasonSelect.innerHTML = '';
    }

    function sourceLabel(m) {
      const type = m.media_type ? ` - ${m.media_type}` : '';
      const lang = m.language && m.language !== 'Unknown' ? `[${m.language}] ` : '';
      return `${lang}${m.source || 'Unknown'}${type}${m.year ? ` (${m.year})` : ''}`;
    }

    async function doSearch() {
      const q = refs.input.value.trim();
      if (q.length < 2) {
        setStatus('Type at least 2 characters to search.', 'error');
        return;
      }

      resetPlayerAndSelection();
      setStatus('Searching sources...');
      setSearchLoading(true, 'Searching sources...');
      refs.resultList.innerHTML = '';

      try {
        const src = refs.source.value;
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&source=${encodeURIComponent(src)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'search failed');

        if (!data.items || data.items.length === 0) {
          setStatus('No results found.', 'error');
          return;
        }

        for (const item of data.items) {
          const card = document.createElement('button');
          card.className = 'item';
          const animeName = (item.anime_name || item.name || 'Untitled media').trim();
          card.innerHTML = `<div class="title">${safeText(animeName)}</div><div class="meta">${safeText(sourceLabel(item))}</div>`;
          card.onclick = () => selectMedia(item, card);
          refs.resultList.appendChild(card);
        }

        setStatus(`Found ${data.items.length} result(s).`, 'ok');
      } catch (err) {
        setStatus(`Search error: ${err.message}`, 'error');
      } finally {
        setSearchLoading(false);
      }
    }

    async function selectMedia(item, cardEl = null) {
      if (state.hls) {
        state.hls.destroy();
        state.hls = null;
      }
      refs.player.pause();
      refs.player.removeAttribute('src');
      refs.player.load();
      refs.player.style.display = 'block';

      refs.embedFrame.style.display = 'none';
      refs.embedFrame.removeAttribute('src');

      state.selectedMediaId = item.id;
      state.selectedMedia = item;
      refs.currentName.textContent = (item.anime_name || item.name || 'Untitled media').trim();
      refs.currentMeta.textContent = sourceLabel(item);

      Array.from(refs.resultList.children).forEach(el => el.classList.remove('active'));
      if (cardEl) cardEl.classList.add('active');

      await loadEpisodes();
    }

    function refreshEpisodeWatchedStyle() {
      const watched = watchedEpisodeSetForSelectedAnime();
      const nodes = Array.from(refs.episodeList.children);
      nodes.forEach((el, idx) => {
        const ep = state.episodes[idx];
        if (!ep) return;
        el.classList.toggle('watched', watched.has(Number(ep.number)));
      });
    }

    async function loadEpisodes() {
      if (!state.selectedMediaId) return;

      setStatus('Loading episodes...');
      refs.episodeList.innerHTML = '';
      refs.episodeSelect.innerHTML = '';

      try {
        const season = Number(refs.seasonSelect.value || 1);
        const res = await fetch(`/api/media/${state.selectedMediaId}/episodes?season=${season}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'failed to load episodes');

        state.episodes = data.episodes || [];

        refs.seasonSelect.innerHTML = '';
        if (Array.isArray(data.seasons) && data.seasons.length > 0) {
          for (const s of data.seasons) {
            const opt = document.createElement('option');
            opt.value = s.number;
            opt.textContent = s.title || `Season ${s.number}`;
            refs.seasonSelect.appendChild(opt);
          }
          refs.seasonSelect.value = data.selected_season || 1;
          refs.seasonSelect.disabled = false;
        } else {
          const opt = document.createElement('option');
          opt.value = '1';
          opt.textContent = 'Single season';
          refs.seasonSelect.appendChild(opt);
          refs.seasonSelect.disabled = true;
        }

        if (state.episodes.length === 0) {
          setStatus('No episodes found for this media.', 'error');
          return;
        }

        for (const ep of state.episodes) {
          const epBtn = document.createElement('button');
          epBtn.className = 'item';
          epBtn.innerHTML = `<div class="title">Episode ${safeText(ep.number)}</div><div class="meta">${safeText(ep.label)}</div>`;
          epBtn.onclick = () => {
            state.selectedEpisode = ep.number;
            refs.episodeSelect.value = String(ep.number);
            highlightEpisode(ep.number);
          };
          refs.episodeList.appendChild(epBtn);

          const opt = document.createElement('option');
          opt.value = ep.number;
          opt.textContent = `Episode ${ep.number}`;
          refs.episodeSelect.appendChild(opt);
        }

        state.selectedEpisode = state.episodes[0].number;
        refs.episodeSelect.value = String(state.selectedEpisode);
        highlightEpisode(state.selectedEpisode);
        refreshEpisodeWatchedStyle();
        setStatus(`Loaded ${state.episodes.length} episode(s).`, 'ok');
      } catch (err) {
        setStatus(`Episodes error: ${err.message}`, 'error');
      }
    }

    function highlightEpisode(number) {
      const nodes = Array.from(refs.episodeList.children);
      nodes.forEach((el, idx) => {
        const ep = state.episodes[idx];
        if (!ep) return;
        el.classList.toggle('active', Number(ep.number) === Number(number));
      });
    }

    function applyPlayerURL(url, isEmbed = false) {
      if (state.hls) {
        state.hls.destroy();
        state.hls = null;
      }

      if (isEmbed) {
        refs.player.pause();
        refs.player.removeAttribute('src');
        refs.player.load();
        refs.player.style.display = 'none';

        refs.embedFrame.style.display = 'block';
        refs.embedFrame.src = url;
        return;
      }

      refs.embedFrame.style.display = 'none';
      refs.embedFrame.removeAttribute('src');
      refs.player.style.display = 'block';

      const video = refs.player;
      const isM3U8 = url.includes('.m3u8') || url.includes('mpegurl');

      if (isM3U8 && window.Hls && Hls.isSupported()) {
        state.hls = new Hls();
        state.hls.loadSource(url);
        state.hls.attachMedia(video);
      } else {
        video.src = url;
      }
    }

    async function playSelected() {
      if (!state.selectedMediaId) {
        setStatus('Select a media item first.', 'error');
        return;
      }

      state.selectedEpisode = Number(refs.episodeSelect.value || state.selectedEpisode || 1);
      const season = Number(refs.seasonSelect.value || 1);
      const quality = refs.quality.value;

      setStatus('Resolving stream URL...');
      recordHistory('play');
      try {
        const url = `/api/media/${state.selectedMediaId}/stream?episode=${state.selectedEpisode}&season=${season}&quality=${encodeURIComponent(quality)}`;
        const res = await fetch(url);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'failed to resolve stream');

        const isEmbed = !!data.is_embed;
        applyPlayerURL(data.proxy_url || data.stream_url, isEmbed);

        if (!isEmbed) {
          const video = refs.player;
          await video.play().catch(() => undefined);
        }

        setStatus(`Playing episode ${state.selectedEpisode}.`, 'ok');
      } catch (err) {
        setStatus(`Play error: ${err.message}`, 'error');
      }
    }

    function downloadSelected() {
      if (!state.selectedMediaId) {
        setStatus('Select a media item first.', 'error');
        return;
      }

      state.selectedEpisode = Number(refs.episodeSelect.value || state.selectedEpisode || 1);
      const season = Number(refs.seasonSelect.value || 1);
      const quality = refs.quality.value;
      const url = `/api/media/${state.selectedMediaId}/download?episode=${state.selectedEpisode}&season=${season}&quality=${encodeURIComponent(quality)}`;
      recordHistory('download');
      window.open(url, '_blank');
      setStatus(`Download started for episode ${state.selectedEpisode}.`, 'ok');
    }

    function clearHistory() {
      state.historyRecords = [];
      state.selectedHistoryAnimeKey = '';
      saveCollection(HISTORY_KEY, state.historyRecords);
      renderHistoryPanels();
      refreshEpisodeWatchedStyle();
      setStatus('Histórico limpo.', 'ok');
    }

    function clearPlan() {
      state.planItems = [];
      state.selectedPlanAnimeKey = '';
      saveCollection(PLAN_KEY, state.planItems);
      renderPlanPanels();
      setStatus('Minha lista limpa.', 'ok');
    }

    function initSavedLists() {
      state.historyRecords = loadCollection(HISTORY_KEY, []);
      state.planItems = loadCollection(PLAN_KEY, []);
      setActiveCollectionPanel('history');
      renderHistoryPanels();
      renderPlanPanels();
    }

    refs.search.addEventListener('click', doSearch);
    refs.input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doSearch();
    });

    refs.seasonSelect.addEventListener('change', loadEpisodes);
    refs.episodeSelect.addEventListener('change', () => {
      state.selectedEpisode = Number(refs.episodeSelect.value || 1);
      highlightEpisode(state.selectedEpisode);
    });

    refs.play.addEventListener('click', playSelected);
    refs.download.addEventListener('click', downloadSelected);
    refs.planBtn.addEventListener('click', addPlanCurrentAnime);
    refs.historyToggleBtn.addEventListener('click', () => setActiveCollectionPanel('history'));
    refs.planToggleBtn.addEventListener('click', () => setActiveCollectionPanel('plan'));
    refs.clearHistoryBtn.addEventListener('click', clearHistory);
    refs.clearPlanBtn.addEventListener('click', clearPlan);

    initSavedLists();
  </script>
</body>
</html>
